              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 500
                  message:
                    type: string
                required:
                  - status
                  - message
                additionalProperties: false
    post:
      operationId: addStudio
      tags:
        - studios
      summary: Adds a new Studio.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Studio display name.
                  example: Default Studio
                blueprintId:
                  type: string
                  description: Id of the Blueprint to use for the Studio.
                  example: studio0
                blueprintConfigPresetId:
                  type: string
                  description: Id of the Blueprint config preset to use for the Studio.
                  example: fcr
                supportedShowStyleBase:
                  type: array
                  items:
                    type: string
                    description: ShowStyleBases that this Studio wants to support.
                  example:
                    - showstyle0
                    - showstyle1
                config:
                  type: object
                  description: Blueprint configuration.
                  properties:
                    developerMode:
                      type: boolean
                      example: true
                  additionalProperties: true
                settings:
                  type: object
                  properties:
                    frameRate:
                      type: number
                      exclusiveMinimum: 0
                      example: 25
                      description: >-
                        The framerate (frames per second) used to convert internal timing information (in milliseconds)
                        into timecodes and timecode-like strings and interpret timecode user input.
                    mediaPreviewsUrl:
                      type: string
                      example: http://127.0.0.1:8080
                      description: URL to endpoint where media preview are exposed
                    slackEvaluationUrls:
                      type: array
                      items:
                        type: string
                        example: http://127.0.0.1:8080
                      description: URLs for slack webhook to send evaluations.
                    supportedMediaFormats:
                      type: array
                      items:
                        type: string
                        example: 1080i5000
                      description: Media Resolutions supported by the studio for media playback.
                    supportedAudioStreams:
                      type: array
                      items:
                        type: string
                        example: stereo
                      description: Audio Stream Formats supported by the studio for media playback.
                    enablePlayFromAnywhere:
                      type: boolean
                      description: Should the play from anywhere feature be enabled in this studio.
                    forceMultiGatewayMode:
                      type: boolean
                      description: >-
                        If set, forces the multi-playout-gateway mode (aka set "now"-time right away) for single
                        playout-gateways setups.
                    multiGatewayNowSafeLatency:
                      type: number
                      exclusiveMinimum: 0
                      description: >-
                        How much extra delay to add to the Now-time (used for the "multi-playout-gateway" feature). A
                        higher value adds delays in playout, but reduces the risk of missed frames.
                    preserveUnsyncedPlayingSegmentContents:
                      type: boolean
                      deprecated: true
                      description: This no longer has any effect
                    allowRundownResetOnAir:
                      type: boolean
                      description: Allow resets while a rundown is on-air
                    preserveOrphanedSegmentPositionInRundown:
                      type: boolean
                      description: Preserve unsynced segments psoition in the rundown, relative to the other segments
                    enableQuickLoop:
                      type: boolean
                      description: Should QuickLoop context menu options be available to the users
                    forceQuickLoopAutoNext:
                      type: string
                      enum:
                        - disabled
                        - enabled_when_valid_duration
                        - enabled_forcing_min_duration
                      description: If and how to force auto-nexting in a looping Playlist
                    fallbackPartDuration:
                      type: number
                      description: >-
                        The duration to apply on too short Parts Within QuickLoop when forceQuickLoopAutoNext is set to
                        `enabled_forcing_min_duration`
                    allowAdlibTestingSegment:
                      type: boolean
                      description: Whether to allow adlib testing mode, before a Part is playing in a Playlist
                    allowTestingAdlibsToPersist:
                      type: boolean
                      description: Whether to allow infinite adlib from adlib testing mode to persist in the rundown
                    allowHold:
                      type: boolean
                      description: Whether to allow hold operations for Rundowns in this Studio
                    allowPieceDirectPlay:
                      type: boolean
                      description: Whether to allow direct playing of a piece in the rundown
                    rundownGlobalPiecesPrepareTime:
                      type: number
                      description: How long before their start time a rundown owned piece be added to the timeline
                  required:
                    - frameRate
                    - mediaPreviewsUrl
              required:
                - name
                - config
                - settings
              additionalProperties: false
      responses:
        '200':
          description: Create successful, Id of new Studio is returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  result:
                    type: string
                    description: Id of the newly created Studio.
        '400':
          description: Invalid Studio.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 400
                  message:
                    type: string
                required:
                  - status
                  - message
                additionalProperties: false
        '409':
          description: The specified Studio configuration is not valid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 409
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                      example: Invalid Union
                required:
                  - status
                  - message
                additionalProperties: false
        '500':
          description: An error unlikely to be the fault of the caller has occurred.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 500
                  message:
                    type: string
                required:
                  - status
                  - message
                additionalProperties: false
