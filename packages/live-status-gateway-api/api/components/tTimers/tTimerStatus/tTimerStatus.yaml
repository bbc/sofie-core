$defs:
  tTimerStatus:
    type: object
    title: TTimerStatus
    description: Status of a single T-timer in the playlist
    properties:
      index:
        $ref: '../tTimerIndex.yaml#/$defs/tTimerIndex'
      label:
        description: User-defined label for the timer
        type: string
      configured:
        description: Whether the timer has been configured (mode is not null)
        type: boolean
      mode:
        description: Timer mode and timing state. Null if not configured.
        oneOf:
          - type: 'null'
          - $ref: '../tTimerMode/tTimerMode.yaml#/$defs/tTimerMode'
      projected:
        description: >-
          Projected timing for when we expect to reach an anchor part.
          Used to calculate over/under diff
        oneOf:
          - type: 'null'
          - type: object
            title: TTimerProjected
            description: >-
              Projected timing state for a T-timer
            properties:
              paused:
                description: Whether the projected time is frozen
                type: boolean
              zeroTime:
                description: >-
                  Unix timestamp in milliseconds of projected arrival at the anchor part
                type: number
              pauseTime:
                description: >-
                  Unix timestamp (ms) when the projected timer should automatically pause.
                  When present and current time >= pauseTime, the projected duration should be calculated from pauseTime.
                type: number
              durationMs:
                description: >-
                  Frozen remaining duration projection in milliseconds
                type: number
            required: [paused]
            additionalProperties: false
      anchorPartId:
        description: >-
          The Part ID that this timer is counting towards (the timing anchor)
        type: string
    required: [index, label, configured]
    additionalProperties: false
    examples:
      - $ref: './tTimerStatus-example.yaml'
